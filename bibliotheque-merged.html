<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliotheque — Library Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5efe0;
    --cream: #faf6ed;
    --gold: #c9953a;
    --gold-light: #e8c06a;
    --rust: #8b3a2a;
    --sage: #4a6741;
    --shadow: rgba(26,18,8,0.15);
    --border: #d4c4a0;
    --muted: #8a7a65;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,149,58,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,58,42,0.06) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--parchment);
    padding: 2rem 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '❧';
    position: absolute;
    right: 3rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8rem;
    opacity: 0.04;
    pointer-events: none;
  }
  .logo { display: flex; flex-direction: column; gap: 0.2rem; }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--gold-light);
    line-height: 1;
  }
  .logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(245,239,224,0.5);
  }
  .header-stats {
    display: flex;
    gap: 2rem;
    align-items: flex-end;
  }
  .stat {
    text-align: right;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,239,224,0.45);
  }

  /* ── TABS ── */
  .tab-container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
  }
  .tab-button {
    padding: 1rem 2rem;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-weight: 500;
  }
  .tab-button:hover { color: var(--gold); }
  .tab-button.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 2rem;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; width: 100%; }

  /* ── SECTION TITLES ── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--ink);
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-count {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    color: var(--gold);
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.4rem;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    transition: border-color 0.2s;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder { color: #b0a080; }

  select {
    padding: 0.65rem 1rem;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--gold); }

  .filter-btn {
    padding: 0.65rem 1.1rem;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    color: #7a6a50;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--gold-light);
  }

  /* ── BOOK GRID ── */
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
  }

  .book-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
    position: relative;
  }
  .book-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px var(--shadow);
  }
  .book-card.borrowed { opacity: 0.7; }
  .book-card.borrowed .book-spine { background: #c0b090; }

  .book-spine {
    height: 6px;
    background: var(--gold);
    transition: background 0.3s;
  }
  .book-card[data-genre="fiction"] .book-spine { background: #c9953a; }
  .book-card[data-genre="science"] .book-spine { background: #4a7a6a; }
  .book-card[data-genre="history"] .book-spine { background: #8b3a2a; }
  .book-card[data-genre="philosophy"] .book-spine { background: #5a4a8b; }
  .book-card[data-genre="biography"] .book-spine { background: #4a6741; }
  .book-card[data-genre="somali"] .book-spine { background: #6b5b3d; }
  .book-card[data-genre="Sci-Fi"] .book-spine { background: #4a7a6a; }
  .book-card[data-genre="Fiction"] .book-spine { background: #c9953a; }
  .book-card[data-genre="Non-Fiction"] .book-spine { background: #5a4a8b; }
  .book-card[data-genre="Classic"] .book-spine { background: #8b3a2a; }
  .book-card[data-genre="Technology"] .book-spine { background: #4a6741; }
  .book-card[data-genre="Historical Fiction"] .book-spine { background: #6b5b3d; }

  .book-body { padding: 1rem; }
  .book-genre {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }
  .book-author {
    font-size: 0.68rem;
    color: #7a6a50;
    margin-bottom: 0.8rem;
  }
  .book-meta {
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.5rem;
    gap: 0.5rem;
  }
  .book-status {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    font-weight: 500;
  }
  .status-available { background: #e8f4e8; color: var(--sage); }
  .status-borrowed { background: #fde8e0; color: var(--rust); }
  .status-checked { background: #fde8e0; color: var(--rust); }
  .status-reserved { background: #f0e8d8; color: #7a5a1e; }

  .borrow-btn {
    padding: 0.4rem 0.7rem;
    background: white;
    border: 1px solid var(--gold);
    border-radius: 3px;
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .borrow-btn:hover {
    background: var(--gold);
    color: white;
  }
  .borrow-btn.return { background: var(--rust); color: white; border-color: var(--rust); }
  .borrow-btn.return:hover { background: #6b2a1a; }

  .borrowed-by {
    font-size: 0.62rem;
    color: var(--rust);
    margin-top: 0.3rem;
    font-style: italic;
  }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

  .panel {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel-header {
    background: linear-gradient(135deg, var(--ink) 0%, #2a2216 100%);
    color: var(--parchment);
    padding: 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .panel-icon { font-size: 1.2rem; }
  .panel-title { flex: 1; }

  .panel-body {
    padding: 1.2rem;
  }

  .form-group {
    margin-bottom: 1rem;
  }
  .form-label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 600;
  }
  .form-input {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus {
    border-color: var(--gold);
  }

  .submit-btn {
    width: 100%;
    padding: 0.7rem;
    background: var(--ink);
    color: var(--gold-light);
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .submit-btn:hover {
    background: var(--gold);
    color: white;
  }

  /* ── ACTIVITY LOG ── */
  .log-list {
    max-height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .empty-log {
    text-align: center;
    padding: 1.5rem 1rem;
    color: var(--muted);
    font-size: 0.75rem;
  }
  .log-entry {
    padding: 0.75rem;
    background: #fafafa;
    border-left: 2px solid var(--gold);
    border-radius: 2px;
    font-size: 0.7rem;
  }
  .log-action {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.2rem;
    letter-spacing: 0.05em;
  }
  .log-action.borrow { color: var(--sage); }
  .log-action.return { color: var(--rust); }
  .log-book {
    color: var(--ink);
    margin-bottom: 0.2rem;
    line-height: 1.3;
  }
  .log-meta {
    color: var(--muted);
    font-size: 0.65rem;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty-state-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }
  .empty-state-text {
    font-size: 0.9rem;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--gold-light);
    padding: 1rem 1.5rem;
    border-radius: 4px;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 1000;
    letter-spacing: 0.05em;
  }
  #toast.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── MODAL ── */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 18, 8, 0.6);
    z-index: 2000;
    justify-content: center;
    align-items: center;
  }
  .modal.open {
    display: flex;
  }
  .modal-content {
    background: white;
    border-radius: 6px;
    padding: 2rem;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(26, 18, 8, 0.25);
  }
  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: transparent;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted);
  }
  .modal-close:hover { color: var(--ink); }

  .modal-header {
    margin-bottom: 1.5rem;
  }
  .modal-genre {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }
  .modal-author {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
  }

  .modal-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin: 1.5rem 0;
    padding: 1rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
  }
  .modal-info-item { display: flex; flex-direction: column; gap: 0.3rem; }
  .modal-label {
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .modal-value {
    color: var(--ink);
    font-weight: 500;
  }

  .modal-description {
    margin: 1.5rem 0;
    line-height: 1.6;
    font-size: 0.85rem;
    color: var(--ink);
  }

  .modal-button {
    width: 100%;
    padding: 0.8rem;
    background: var(--ink);
    color: var(--gold-light);
    border: none;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .modal-button:hover {
    background: var(--gold);
    color: white;
  }
  .modal-button:disabled {
    background: var(--muted);
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    main {
      grid-template-columns: 1fr;
      padding: 1.5rem 1rem;
    }
    .book-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .header-stats {
      gap: 1rem;
    }
    .stat-num {
      font-size: 1.4rem;
    }
    header { padding: 1.5rem; }
    .logo-title { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-title">Bibliotheque</div>
    <div class="logo-sub">Library Management System</div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-available">0</div>
      <div class="stat-label">Available</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-borrowed">0</div>
      <div class="stat-label">Borrowed</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
</header>

<div class="tab-container">
  <button class="tab-button active" data-tab="tab-system">Library System</button>
  <button class="tab-button" data-tab="tab-catalog">Books Catalog</button>
</div>

<main>
  <!-- TAB 1: Library System (Borrow & Return) -->
  <section class="tab-content active" id="tab-system">
    <div class="section-header">
      <h2 class="section-title">Catalogue</h2>
      <div class="section-line"></div>
      <span class="section-count" id="visible-count">0 titles</span>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search title or author…">
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="borrowed">Borrowed</button>
    </div>

    <div class="book-grid" id="book-grid"></div>
  </section>

  <!-- TAB 2: Books Catalog (Somali & Extended) -->
  <section class="tab-content" id="tab-catalog">
    <div class="section-header">
      <h2 class="section-title">Books Catalog</h2>
      <div class="section-line"></div>
      <span class="section-count" id="catalog-count">0 titles</span>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search by title, author, ISBN…">
      </div>
      <select id="sortSelect">
        <option value="title">Sort: Title</option>
        <option value="author">Sort: Author</option>
        <option value="year">Sort: Year</option>
        <option value="rating">Sort: Rating</option>
      </select>
    </div>

    <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem;" id="filters"></div>

    <div class="book-grid" id="grid"></div>
  </section>

  <!-- RIGHT: Sidebar -->
  <aside class="sidebar">
    <!-- Quick Borrow/Return Form -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-icon">📖</span>
        <span class="panel-title">Borrow a Book</span>
      </div>
      <div class="panel-body">
        <div class="form-group">
          <label class="form-label" for="member-name">Member Name</label>
          <input type="text" class="form-input" id="member-name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label class="form-label" for="book-select">Select Book</label>
          <select class="form-input" id="book-select">
            <option value="">— Choose an available book —</option>
          </select>
        </div>
        <button class="submit-btn" onclick="quickBorrow()">Confirm Borrow</button>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-icon">📋</span>
        <span class="panel-title">Activity Log</span>
      </div>
      <div class="log-list" id="activity-log">
        <div class="empty-log">No activity yet.</div>
      </div>
    </div>
  </aside>
</main>

<!-- MODAL for Catalog -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button id="mClose" class="modal-close">✕</button>
    <div class="modal-header">
      <div class="modal-genre" id="mGenre"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-author" id="mAuthor"></div>
    </div>
    <div class="modal-info">
      <div class="modal-info-item">
        <div class="modal-label">ISBN</div>
        <div class="modal-value" id="mIsbn"></div>
      </div>
      <div class="modal-info-item">
        <div class="modal-label">Year</div>
        <div class="modal-value" id="mYear"></div>
      </div>
      <div class="modal-info-item">
        <div class="modal-label">Pages</div>
        <div class="modal-value" id="mPages"></div>
      </div>
      <div class="modal-info-item">
        <div class="modal-label">Location</div>
        <div class="modal-value" id="mLoc"></div>
      </div>
      <div class="modal-info-item">
        <div class="modal-label">Status</div>
        <div class="modal-value" id="mStatus"></div>
      </div>
      <div class="modal-info-item">
        <div class="modal-label">Rating</div>
        <div class="modal-value" id="mRat"></div>
      </div>
    </div>
    <div class="modal-description" id="mDesc"></div>
    <button id="mBtn" class="modal-button">Reserve this Book</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── LIBRARY SYSTEM DATA ──────────────────────────────────────
const systemBooks = [

let activityLog = [];
let activeFilter = 'all';
let searchQuery = '';
let activeGenre = "All";
let searchQ = "";
let sortBy = "title";
let currentBook = null;

const genres = ["All", ...new Set(BOOKS.map(b => b.genre))];

// ── UTILITY FUNCTIONS ──────────────────────────────────────
function stars(r) {
  const full = Math.floor(r), half = r % 1 >= 0.5 ? 1 : 0;
  return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(5 - full - half);
}

function statusClass(s) {
  return s === "available" ? "status-available" : s === "checked" ? "status-checked" : "status-reserved";
}

function statusLabel(s) {
  return s === "available" ? "Available" : s === "checked" ? "Checked Out" : "Reserved";
}

// ── SYSTEM TAB: RENDER ─────────────────────────────────────
function renderSystemTab() {
  const grid = document.getElementById('book-grid');
  const filtered = systemBooks.filter(b => {
    const matchSearch = !searchQuery ||
      b.title.toLowerCase().includes(searchQuery) ||
      b.author.toLowerCase().includes(searchQuery);
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'available' && !b.borrowed) ||
      (activeFilter === 'borrowed' && b.borrowed);
    return matchSearch && matchFilter;
  });

  grid.innerHTML = filtered.length ? filtered.map(systemBookCard).join('') : `
    <div class="empty-state">
      <div class="empty-state-icon">📚</div>
      <div class="empty-state-text">No books match your search.</div>
    </div>`;

  document.getElementById('visible-count').textContent = `${filtered.length} title${filtered.length !== 1 ? 's' : ''}`;
  updateStats();
  updateBookSelect();
}

function systemBookCard(b) {
  const status = b.borrowed ? 'borrowed' : 'available';
  const btnClass = b.borrowed ? 'return' : 'borrow';
  const btnText = b.borrowed ? 'Return' : 'Borrow';
  const borrowedLine = b.borrower ? `<div class="borrowed-by">→ ${b.borrower}</div>` : '';
  return `
    <div class="book-card ${b.borrowed ? 'borrowed' : ''}" data-genre="${b.genre}">
      <div class="book-spine"></div>
      <div class="book-body">
        <div class="book-genre">${b.genre}</div>
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        ${borrowedLine}
        <div class="book-footer">
          <span class="book-status status-${status}">${status}</span>
          <button class="borrow-btn ${btnClass}" onclick="${b.borrowed ? `returnBook(${b.id})` : `borrowBook(${b.id})`}">${btnText}</button>
        </div>
      </div>
    </div>`;
}

function updateStats() {
  const borrowed = systemBooks.filter(b => b.borrowed).length;
  document.getElementById('stat-total').textContent = systemBooks.length + BOOKS.length;
  document.getElementById('stat-available').textContent = systemBooks.length - borrowed + BOOKS.filter(b => b.status === "available").length;
  document.getElementById('stat-borrowed').textContent = borrowed + BOOKS.filter(b => b.status !== "available").length;
}

function updateBookSelect() {
  const sel = document.getElementById('book-select');
  const available = systemBooks.filter(b => !b.borrowed);
  sel.innerHTML = `<option value="">— Choose an available book —</option>` +
    available.map(b => `<option value="${b.id}">${b.title}</option>`).join('');
}

// ── SYSTEM TAB: ACTIONS ────────────────────────────────────
function borrowBook(id) {
  const book = systemBooks.find(b => b.id === id);
  if (!book || book.borrowed) return;
  const name = prompt(`Borrow "${book.title}" — Enter your name:`);
  if (!name || !name.trim()) return;
  book.borrowed = true;
  book.borrower = name.trim();
  logAction('borrow', book, name.trim());
  toast(`"${book.title}" borrowed by ${name.trim()}`);
  renderSystemTab();
}

function returnBook(id) {
  const book = systemBooks.find(b => b.id === id);
  if (!book || !book.borrowed) return;
  const prev = book.borrower;
  book.borrowed = false;
  book.borrower = null;
  logAction('return', book, prev);
  toast(`"${book.title}" returned. Thanks, ${prev}!`);
  renderSystemTab();
}

function quickBorrow() {
  const name = document.getElementById('member-name').value.trim();
  const id = parseInt(document.getElementById('book-select').value);
  if (!name) { toast('Please enter a member name.'); return; }
  if (!id) { toast('Please select a book.'); return; }
  const book = systemBooks.find(b => b.id === id);
  if (!book) return;
  book.borrowed = true;
  book.borrower = name;
  logAction('borrow', book, name);
  toast(`"${book.title}" borrowed by ${name}`);
  document.getElementById('member-name').value = '';
  renderSystemTab();
}

// ── ACTIVITY LOG ──────────────────────────────────────────
function logAction(type, book, member) {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  activityLog.unshift({ type, title: book.title, member, time });
  renderLog();
}

function renderLog() {
  const el = document.getElementById('activity-log');
  if (!activityLog.length) { el.innerHTML = '<div class="empty-log">No activity yet.</div>'; return; }
  el.innerHTML = activityLog.slice(0, 20).map(e => `
    <div class="log-entry">
      <div class="log-action ${e.type}">${e.type === 'borrow' ? '▼ Borrowed' : '▲ Returned'}</div>
      <div class="log-book">${e.title}</div>
      <div class="log-meta">${e.member} · ${e.time}</div>
    </div>`).join('');
}

// ── CATALOG TAB: RENDER ────────────────────────────────────
function getFiltered() {
  let list = BOOKS.filter(b => {
    const g = activeGenre === "All" || b.genre === activeGenre;
    const q = !searchQ || [b.title, b.author, b.isbn, b.genre].some(f => f.toLowerCase().includes(searchQ));
    return g && q;
  });
  list.sort((a, b) => {
    if (sortBy === "title")  return a.title.localeCompare(b.title);
    if (sortBy === "author") return a.author.localeCompare(b.author);
    if (sortBy === "year")   return b.year - a.year;
    if (sortBy === "rating") return b.rating - a.rating;
  });
  return list;
}

function renderCatalogTab() {
  const list = getFiltered();
  document.getElementById('catalog-count').textContent = `${list.length} title${list.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">📚</div>
      <div class="empty-state-text">No books match your search.</div>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(b => `
    <div class="book-card" data-genre="${b.genre}" style="cursor: pointer;" onclick="openModal(${b.id})">
      <div class="book-spine"></div>
      <div class="book-body">
        <div class="book-genre">${b.genre}</div>
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-meta">📅 ${b.year} · 📄 ${b.pages}pp</div>
        <div class="book-footer">
          <span class="book-status ${statusClass(b.status)}">${statusLabel(b.status)}</span>
        </div>
      </div>
    </div>
  `).join("");
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = genres.map(g =>
    `<button class="filter-btn${g === activeGenre ? " active" : ""}" data-g="${g}">${g}</button>`
  ).join("");
  el.querySelectorAll(".filter-btn").forEach(b => b.addEventListener("click", () => {
    activeGenre = b.dataset.g; renderFilters(); renderCatalogTab();
  }));
}

// ── MODAL ──────────────────────────────────────────────────
function openModal(id) {
  const b = BOOKS.find(x => x.id === id);
  if (!b) return;
  currentBook = b;
  document.getElementById("mGenre").textContent  = b.genre;
  document.getElementById("mTitle").textContent  = b.title;
  document.getElementById("mAuthor").textContent = b.author;
  document.getElementById("mIsbn").textContent   = b.isbn;
  document.getElementById("mYear").textContent   = b.year;
  document.getElementById("mPages").textContent  = b.pages + " pages";
  document.getElementById("mStatus").textContent = statusLabel(b.status);
  document.getElementById("mLoc").textContent    = b.location;
  document.getElementById("mRat").textContent    = stars(b.rating) + "  " + b.rating.toFixed(1);
  document.getElementById("mDesc").textContent   = b.description;
  const btn = document.getElementById("mBtn");
  if (b.status === "available") { btn.textContent = "Reserve this Book"; btn.disabled = false; }
  else if (b.status === "reserved") { btn.textContent = "Already Reserved"; btn.disabled = true; }
  else { btn.textContent = "Join Waitlist"; btn.disabled = false; }
  document.getElementById("modal").classList.add("open");
}

// ── TOAST ──────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── TAB SWITCHING ──────────────────────────────────────────
document.querySelectorAll('.tab-button').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabId = btn.dataset.tab;
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(tabId).classList.add('active');
  });
});

// ── SYSTEM TAB: EVENTS ─────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  renderSystemTab();
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderSystemTab();
  });
});

// ── CATALOG TAB: EVENTS ────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  renderCatalogTab();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortBy = e.target.value;
  renderCatalogTab();
});

document.getElementById("mClose").addEventListener("click", () =>
  document.getElementById("modal").classList.remove("open")
);

document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal"))
    document.getElementById("modal").classList.remove("open");
});

document.getElementById("mBtn").addEventListener("click", () => {
  if (!currentBook || currentBook.status !== "available") return;
  currentBook.status = "reserved";
  renderCatalogTab();
  document.getElementById("modal").classList.remove("open");
  toast(`"${currentBook.title}" reserved!`);
});

// ── INITIALIZATION ────────────────────────────────────────
renderSystemTab();
renderFilters();
renderCatalogTab();
</script>
