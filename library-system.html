<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliotheque — Library System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5efe0;
    --cream: #faf6ed;
    --gold: #c9953a;
    --gold-light: #e8c06a;
    --rust: #8b3a2a;
    --sage: #4a6741;
    --shadow: rgba(26,18,8,0.15);
    --border: #d4c4a0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,149,58,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,58,42,0.06) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--parchment);
    padding: 2rem 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '❧';
    position: absolute;
    right: 3rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8rem;
    opacity: 0.04;
    pointer-events: none;
  }
  .logo { display: flex; flex-direction: column; gap: 0.2rem; }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--gold-light);
    line-height: 1;
  }
  .logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(245,239,224,0.5);
  }
  .header-stats {
    display: flex;
    gap: 2rem;
    align-items: flex-end;
  }
  .stat {
    text-align: right;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,239,224,0.45);
  }

  /* ── MAIN LAYOUT ── */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 2rem;
  }

  /* ── SECTION TITLES ── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--ink);
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-count {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    color: var(--gold);
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.4rem;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    transition: border-color 0.2s;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder { color: #b0a080; }

  .filter-btn {
    padding: 0.65rem 1.1rem;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    color: #7a6a50;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--gold-light);
  }

  /* ── BOOK GRID ── */
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
  }

  .book-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
    position: relative;
  }
  .book-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px var(--shadow);
  }
  .book-card.borrowed { opacity: 0.7; }
  .book-card.borrowed .book-spine { background: #c0b090; }

  .book-spine {
    height: 6px;
    background: var(--gold);
    transition: background 0.3s;
  }
  .book-card[data-genre="fiction"] .book-spine { background: #c9953a; }
  .book-card[data-genre="science"] .book-spine { background: #4a7a6a; }
  .book-card[data-genre="history"] .book-spine { background: #8b3a2a; }
  .book-card[data-genre="philosophy"] .book-spine { background: #5a4a8b; }
  .book-card[data-genre="biography"] .book-spine { background: #4a6741; }

  .book-body { padding: 1rem; }
  .book-genre {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 0.3rem;
  }
  .book-author {
    font-size: 0.68rem;
    color: #7a6a50;
    margin-bottom: 0.8rem;
  }
  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.5rem;
    gap: 0.5rem;
  }
  .book-status {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    font-weight: 500;
  }
  .status-available { background: #e8f4e8; color: var(--sage); }
  .status-borrowed { background: #fde8e0; color: var(--rust); }

  .borrow-btn {
    padding: 0.4rem 0.8rem;
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .borrow-btn.borrow {
    background: var(--ink);
    color: var(--gold-light);
  }
  .borrow-btn.borrow:hover { background: #2e2416; }
  .borrow-btn.return {
    background: var(--rust);
    color: #fff;
  }
  .borrow-btn.return:hover { background: #6e2e1e; }

  .borrowed-by {
    font-size: 0.6rem;
    color: var(--rust);
    margin-top: 0.4rem;
  }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

  /* ── BORROW PANEL ── */
  .panel {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel-header {
    background: var(--ink);
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold-light);
  }
  .panel-icon { font-size: 1rem; }
  .panel-body { padding: 1.2rem; }

  .form-group { margin-bottom: 0.9rem; }
  .form-label {
    display: block;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #7a6a50;
    margin-bottom: 0.35rem;
  }
  .form-input {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    background: var(--cream);
  }
  .form-input:focus { border-color: var(--gold); background: white; }

  .submit-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--ink);
    color: var(--gold-light);
    border: none;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .submit-btn:hover { background: #2e2416; }
  .submit-btn:active { transform: scale(0.99); }

  /* ── ACTIVITY LOG ── */
  .log-list { display: flex; flex-direction: column; gap: 0; max-height: 320px; overflow-y: auto; }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: var(--cream); }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    padding: 0.75rem 1.2rem;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.3s ease;
  }
  .log-entry:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-action {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 0.15rem;
  }
  .log-action.borrow { color: var(--rust); }
  .log-action.return { color: var(--sage); }
  .log-book { font-size: 0.75rem; color: var(--ink); font-weight: 500; }
  .log-meta { font-size: 0.62rem; color: #9a8a70; margin-top: 0.1rem; }

  .empty-log {
    padding: 1.5rem 1.2rem;
    text-align: center;
    font-size: 0.72rem;
    color: #b0a080;
    font-style: italic;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--parchment);
    padding: 0.75rem 1.5rem;
    border-radius: 4px;
    border-left: 3px solid var(--gold);
    font-size: 0.78rem;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: #b0a080;
  }
  .empty-state-icon { font-size: 3rem; opacity: 0.3; margin-bottom: 0.75rem; }
  .empty-state-text { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-style: italic; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    header { padding: 1.5rem; }
    .logo-title { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-title">Bibliotheque</div>
    <div class="logo-sub">Library Management System</div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-available">0</div>
      <div class="stat-label">Available</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-borrowed">0</div>
      <div class="stat-label">Borrowed</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
</header>

<main>
  <!-- LEFT: Book Catalogue -->
  <section>
    <div class="section-header">
      <h2 class="section-title">Catalogue</h2>
      <div class="section-line"></div>
      <span class="section-count" id="visible-count">0 titles</span>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search title or author…">
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="borrowed">Borrowed</button>
    </div>

    <div class="book-grid" id="book-grid"></div>
  </section>

  <!-- RIGHT: Sidebar -->
  <aside class="sidebar">
    <!-- Quick Borrow/Return Form -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-icon">📖</span>
        <span class="panel-title">Borrow a Book</span>
      </div>
      <div class="panel-body">
        <div class="form-group">
          <label class="form-label" for="member-name">Member Name</label>
          <input type="text" class="form-input" id="member-name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label class="form-label" for="book-select">Select Book</label>
          <select class="form-input" id="book-select">
            <option value="">— Choose an available book —</option>
          </select>
        </div>
        <button class="submit-btn" onclick="quickBorrow()">Confirm Borrow</button>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-icon">📋</span>
        <span class="panel-title">Activity Log</span>
      </div>
      <div class="log-list" id="activity-log">
        <div class="empty-log">No activity yet.</div>
      </div>
    </div>
  </aside>
</main>

<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────
const books = [
  { id:1,  title:"One Hundred Years of Solitude", author:"Gabriel García Márquez", genre:"fiction",     borrowed:false, borrower:null },
  { id:2,  title:"Sapiens",                        author:"Yuval Noah Harari",       genre:"history",     borrowed:false, borrower:null },
  { id:3,  title:"The Republic",                   author:"Plato",                   genre:"philosophy",  borrowed:false, borrower:null },
  { id:4,  title:"A Brief History of Time",        author:"Stephen Hawking",         genre:"science",     borrowed:false, borrower:null },
  { id:5,  title:"Crime and Punishment",            author:"Fyodor Dostoevsky",       genre:"fiction",     borrowed:false, borrower:null },
  { id:6,  title:"The Double Helix",               author:"James D. Watson",         genre:"science",     borrowed:false, borrower:null },
  { id:7,  title:"Meditations",                    author:"Marcus Aurelius",         genre:"philosophy",  borrowed:false, borrower:null },
  { id:8,  title:"Long Walk to Freedom",           author:"Nelson Mandela",          genre:"biography",   borrowed:false, borrower:null },
  { id:9,  title:"Guns, Germs and Steel",          author:"Jared Diamond",           genre:"history",     borrowed:false, borrower:null },
  { id:10, title:"The Stranger",                   author:"Albert Camus",            genre:"fiction",     borrowed:false, borrower:null },
  { id:11, title:"Leonardo da Vinci",              author:"Walter Isaacson",         genre:"biography",   borrowed:false, borrower:null },
  { id:12, title:"The Origin of Species",          author:"Charles Darwin",          genre:"science",     borrowed:false, borrower:null },
];

let activityLog = [];
let activeFilter = 'all';
let searchQuery = '';

// ── RENDER ────────────────────────────────────────────
function render() {
  const grid = document.getElementById('book-grid');
  const filtered = books.filter(b => {
    const matchSearch = !searchQuery ||
      b.title.toLowerCase().includes(searchQuery) ||
      b.author.toLowerCase().includes(searchQuery);
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'available' && !b.borrowed) ||
      (activeFilter === 'borrowed' && b.borrowed);
    return matchSearch && matchFilter;
  });

  grid.innerHTML = filtered.length ? filtered.map(bookCard).join('') : `
    <div class="empty-state">
      <div class="empty-state-icon">📚</div>
      <div class="empty-state-text">No books match your search.</div>
    </div>`;

  document.getElementById('visible-count').textContent = `${filtered.length} title${filtered.length !== 1 ? 's' : ''}`;
  updateStats();
  updateBookSelect();
}

function bookCard(b) {
  const status = b.borrowed ? 'borrowed' : 'available';
  const btnClass = b.borrowed ? 'return' : 'borrow';
  const btnText = b.borrowed ? 'Return' : 'Borrow';
  const borrowedLine = b.borrower ? `<div class="borrowed-by">→ ${b.borrower}</div>` : '';
  return `
    <div class="book-card ${b.borrowed ? 'borrowed' : ''}" data-genre="${b.genre}">
      <div class="book-spine"></div>
      <div class="book-body">
        <div class="book-genre">${b.genre}</div>
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        ${borrowedLine}
        <div class="book-footer">
          <span class="book-status status-${status}">${status}</span>
          <button class="borrow-btn ${btnClass}" onclick="${b.borrowed ? `returnBook(${b.id})` : `borrowBook(${b.id})`}">${btnText}</button>
        </div>
      </div>
    </div>`;
}

function updateStats() {
  const borrowed = books.filter(b => b.borrowed).length;
  document.getElementById('stat-total').textContent = books.length;
  document.getElementById('stat-available').textContent = books.length - borrowed;
  document.getElementById('stat-borrowed').textContent = borrowed;
}

function updateBookSelect() {
  const sel = document.getElementById('book-select');
  const available = books.filter(b => !b.borrowed);
  sel.innerHTML = `<option value="">— Choose an available book —</option>` +
    available.map(b => `<option value="${b.id}">${b.title}</option>`).join('');
}

// ── ACTIONS ───────────────────────────────────────────
function borrowBook(id) {
  const book = books.find(b => b.id === id);
  if (!book || book.borrowed) return;
  const name = prompt(`Borrow "${book.title}" — Enter your name:`);
  if (!name || !name.trim()) return;
  book.borrowed = true;
  book.borrower = name.trim();
  logAction('borrow', book, name.trim());
  toast(`"${book.title}" borrowed by ${name.trim()}`);
  render();
}

function returnBook(id) {
  const book = books.find(b => b.id === id);
  if (!book || !book.borrowed) return;
  const prev = book.borrower;
  book.borrowed = false;
  book.borrower = null;
  logAction('return', book, prev);
  toast(`"${book.title}" returned. Thanks, ${prev}!`);
  render();
}

function quickBorrow() {
  const name = document.getElementById('member-name').value.trim();
  const id = parseInt(document.getElementById('book-select').value);
  if (!name) { toast('Please enter a member name.'); return; }
  if (!id) { toast('Please select a book.'); return; }
  const book = books.find(b => b.id === id);
  if (!book) return;
  book.borrowed = true;
  book.borrower = name;
  logAction('borrow', book, name);
  toast(`"${book.title}" borrowed by ${name}`);
  document.getElementById('member-name').value = '';
  render();
}

// ── LOG ───────────────────────────────────────────────
function logAction(type, book, member) {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  activityLog.unshift({ type, title: book.title, member, time });
  renderLog();
}

function renderLog() {
  const el = document.getElementById('activity-log');
  if (!activityLog.length) { el.innerHTML = '<div class="empty-log">No activity yet.</div>'; return; }
  el.innerHTML = activityLog.slice(0, 20).map(e => `
    <div class="log-entry">
      <div class="log-action ${e.type}">${e.type === 'borrow' ? '▼ Borrowed' : '▲ Returned'}</div>
      <div class="log-book">${e.title}</div>
      <div class="log-meta">${e.member} · ${e.time}</div>
    </div>`).join('');
}

// ── TOAST ─────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── FILTERS & SEARCH ──────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

// ── INIT ──────────────────────────────────────────────
render();
</script>
</body>
</html>
